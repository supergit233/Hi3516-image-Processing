# MP4 ring recording config
#
# The application reads this file from ./record.conf by default.
# You can also put it at /etc/sample_record.conf, or set:
#   export SAMPLE_RECORD_CONF=/path/to/record.conf
#
# Environment variables SAMPLE_RECORD_DIR / SAMPLE_RECORD_SEGMENT_SEC /
# SAMPLE_RECORD_MAX_SEGMENTS / SAMPLE_RECORD_CODEC override this file.

RECORD_DIR=/mnt     
SEGMENT_SEC=30              
MAX_SEGMENTS=120            
CODEC=h265                  
